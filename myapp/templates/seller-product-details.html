{% extends 'seller-header.html' %}
{% load static %}

{% block content %}

<!-- main product start -->
<section class="main-product space-top gray-bg">
    <div class="container container-width">
        <h2 class="title mb-4 fw-bold">Product views</h2>
        <div class="main-product-wrapper product-details">
            <div class="main-product-right main-product-container">
                <div class="row">
                    
                    <div class="col-12">
                        <div class="item">
                            <div class="single-product">
                                
                                <div class="row p-3 align-items-center">
                                    
                                    <!-- LEFT SIDE IMAGE -->
                                    <div class="col-md-4">
                                        <div class="image-box border">
                                            <img src="{{product.profile_pricture.url}}" 
                                                 alt="product img"
                                                 class="img-fluid img2">

                                            <div class="btn-wrapper">
                                                <ul class="transition">
                                                    <li><a href="#" class="transition">
                                                        <i class="bi bi-bag-check"></i></a></li>
                                                    <li><a href="#" class="transition">
                                                        <i class="bi bi-heart"></i></a></li>
                                                    <li><a href="#" class="transition">
                                                        <i class="bi bi-repeat"></i></a></li>
                                                    <li><a href="#" class="transition">
                                                        <i class="bi bi-eye"></i></a></li>
                                                </ul>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- RIGHT SIDE CONTENT -->
                                    <div class="col-md-8">
                                        <div class="product-content">

                                            <p class="product-category">
                                                {{product.product_category}}
                                            </p>

                                            <h3 class="product-title">
                                                <a href="">{{product.product_name}}</a>
                                            </h3>

                                            <p class="prodict_description">
                                                Product details: {{product.product_desc}}
                                            </p>

                                            <div class="price-box">
                                                <h5 class="new-price">
                                                    ${{product.product_price}}
                                                </h5>
                                            </div>
                                            <div class="product-detail-button">
                                                <a href="{% url 'seller-edit-product' pk=product.pk %}">
                                                    <input type="button" value="EDIT" class="btn btn-primary">
                                                </a>
                                                <a href="{% url 'seller-delete-product' pk=product.pk %}">
                                                    <input type="button" value="DELETE" class="btn btn-danger">
                                                </a>
                                            </div>
                                        </div>
                                    </div>

                                </div> <!-- row -->

                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}

<style>
    

.single-product {
    background: #fff;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.05);
}

.image-box {
    position: relative;
    text-align: center;
}

.image-box img {
    max-height: 350px;
    width: 100%;
    object-fit: contain;
    border-radius: 10px;
    transition: 0.3s ease;
}

.image-box img:hover {
    transform: scale(1.05);
}

/* Right side content spacing */
.product-content {
    padding: 10px 20px;
}

.product-category {
    font-size: 14px;
    color: #888;
    margin-bottom: 10px;
}

.product-title {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 15px;
}

.prodict_description {
    font-size: 15px;
    color: #555;
    margin-bottom: 15px;
}

.price-box .new-price {
    font-size: 20px;
    font-weight: 700;
    color: #28a745;
    margin-bottom: 20px;
}

/* Buttons spacing */
.product-content .btn {
    margin-right: 10px;
}

/* Hover icons */
.btn-wrapper {
    position: absolute;
    top: 15px;
    right: 15px;
}

.btn-wrapper ul {
    list-style: none;
    padding: 0;
    margin: 0;
}

.btn-wrapper ul li {
    margin-bottom: 8px;
}

.btn-wrapper ul li a {
    display: inline-block;
    background: #fff;
    padding: 6px 8px;
    border-radius: 50%;
    color: #333;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.btn-wrapper ul li a:hover {
    background: #007bff;
    color: #fff;
}
</style>
