{% extends 'header.html' %}
{% load static %}
{% block content %}

<main class="login-page">
    
    <!-- Breadcrumb -->
<!-- Beautiful Breadcrumb -->
<div class="page-breadcrumb">
    <div class="container container-width">
        <div class="breadcrumb-wrapper">
            <div class="breadcrumb-list">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item">
                            <a href="/"><i class="bi bi-house"></i></a>
                        </li>
                        <li class="breadcrumb-item active" aria-current="page">
                            Login
                        </li>
                    </ol>
                </nav>
            </div>
        </div>
    </div>
</div>

    <!-- Login Section -->
    <section class="login-section py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5 col-md-7">

                    <div class="login-card p-4 p-md-5">

                        <h2 class="text-center mb-4 fw-bold">Welcome Back 👋</h2>

                        {% if msg %}
                            <div class="alert alert-success text-center">
                                {{ msg }}
                            </div>
                        {% endif %}

                        <form action="{% url 'login' %}" method="post">
                            {% csrf_token %}

                            <!-- Email -->
                            <div class="mb-3 position-relative">
                                <i class="bi bi-envelope input-icon"></i>
                                <input type="email" 
                                       class="form-control custom-input" 
                                       name="email" 
                                       placeholder="Enter your email"
                                       required>
                            </div>

                            <!-- Password -->
                            <div class="mb-3 position-relative">
                                <i class="bi bi-lock input-icon"></i>
                                <input type="password" 
                                       class="form-control custom-input" 
                                       name="password" 
                                       placeholder="Enter your password"
                                       required>
                            </div>

                            <!-- Remember + Forgot -->
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <div>
                                    <input type="checkbox" id="remember">
                                    <label for="remember" class="small">Remember me</label>
                                </div>
                                <a href="{% url 'forgot-password' %}" class="forgot-link">Forgot password?</a>
                            </div>

                            <!-- Button -->
                            <div class="d-grid">
                                <button type="submit" class="btn login-btn">
                                    Login
                                </button>
                            </div>

                            <!-- Signup -->
                            <p class="text-center mt-4 small">
                                Don’t have an account? 
                                <a href="{% url 'signup' %}" class="signup-link">Create one</a>
                            </p>

                        </form>

                    </div>

                </div>
            </div>
        </div>
    </section>

</main>
{% endblock %}
