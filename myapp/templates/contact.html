{% extends 'header.html' %}

{% load static %}

{% block content %}
<!DOCTYPE html>
<html lang="en">

<head>
</head>

<body>
    <main class="contact-us-content">
        <!-- breadcrumb start -->
        <div class="page-breadcrumb">
            <div class="container container-width">
                <div class="breadcrumb-wrapper">
                    <div class="breadcrumb-list">
                        <nav aria-label="breadcrumb">
                            <ol class="breadcrumb">
                                <li class="breadcrumb-item">
                                    <a href="/" class="transition"><i class="bi bi-house"></i></a>
                                </li>
                                <li class="breadcrumb-item active" aria-current="page">contact us</li>
                            </ol>
                        </nav>
                    </div>
                </div>
            </div>
        </div>

        <!-- contact us wrapper -->
        <section class="contact-us space-top space-bottom">
            <div class="container container-width">
                   {% if msg %}
                        <p style="color: green;font-size: 16px;" class="mb-3">{{ msg }}</p>
                    {% endif %}
                <div class="contact-us-wrapper">
                 
                    <div class="contact-left">
                        <form action="{% url 'contact' %}" method="post">
                            {% csrf_token %}
                            <div class="contact-form">
                            <div class="mb-3">
                                <input type="text" class="form-control" name="name" placeholder="name">
                            </div>
                            <div class="mb-3">
                                <input type="email" class="form-control" name="email" placeholder="email">
                            </div>
                            <div class="mb-3">
                                <input type="number" class="form-control" name="mobile" placeholder="phone number">
                            </div>
                            <div class="mb-3">
                                <textarea class="form-control" rows="10" name="message" placeholder="message"></textarea>
                            </div>
                            <div class="text-end mb-4">
                                <button class="main-btn" type="submit">Contact us</button>
                            </div>
                        </div>
                        </form>
                    </div>

                </div>
            </div>
        </section>

        <section class="map space-bottom">
            <div class="container container-width">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d20094339.672589384!2d75.12710611286947!3d30.243823205891736!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x30635ff06b92b791%3A0xd78c4fa1854213a6!2sIndia!5e0!3m2!1sen!2sin!4v1703747978910!5m2!1sen!2sin" width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </section>

    </main>   
</body>

</html>

{% endblock %}
