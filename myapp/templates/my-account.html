{% extends 'seller-header.html' %}
{% load static %}
{% block content %}

<section class="account-section py-5">
    <div class="container">
        <div class="row">

            <!-- Sidebar -->
            <div class="col-lg-3 mb-4">

                <div class="card shadow-sm border-0">

                    <div class="card-body text-center">

                        {% if request.session.profile_pricture %}
                        <img src="{{request.session.profile_pricture}}"
                            style="width:150px;height:150px;border-radius:50%;">
                        {% else %}
                        <i class="bi bi-person-circle" style="font-size:70px;"></i>
                        {% endif %}

                        <h5 class="mt-2">{{request.session.fname}}</h5>
                        <small class="text-muted">{{request.session.email}}</small>

                    </div>


                    <div class="list-group list-group-flush nav flex-column nav-pills">

                        <button class="list-group-item list-group-item-action active" data-bs-toggle="pill"
                            data-bs-target="#profile">

                            <i class="bi bi-person me-2"></i> Profile

                        </button>


                        <button class="list-group-item list-group-item-action" data-bs-toggle="pill"
                            data-bs-target="#orders">

                            <i class="bi bi-box me-2"></i> My Orders

                        </button>


                        <button class="list-group-item list-group-item-action" data-bs-toggle="pill"
                            data-bs-target="#address">

                            <i class="bi bi-geo-alt me-2"></i> Address

                        </button>

                        <a href="{% url 'logout' %}" class="list-group-item list-group-item-action text-danger">

                            <i class="bi bi-box-arrow-right me-2"></i> Logout

                        </a>

                    </div>

                </div>

            </div>


            <!-- Content Area -->
            <div class="col-lg-9">

                <div class="tab-content">

                    <!-- PROFILE TAB -->
                    <div class="tab-pane fade show active" id="profile">

                        <div class="card shadow-sm border-0">

                            <div class="card-header bg-white">
                                <h5 class="mb-0">Profile Information</h5>
                            </div>

                            <div class="card-body">

                                <form method="post" action="{% url 'my-account' %}">
                                    {% csrf_token %}

                                    <div class="mb-3">
                                        <label>Full Name</label>
                                        <input type="text" class="form-control" name="fname" value="{{user.fname}}">
                                    </div>

                                    <div class="mb-3">
                                        <label>Email</label>
                                        <input type="email" class="form-control" value="{{user.email}}" readonly>
                                    </div>

                                    <div class="mb-3">
                                        <label>Mobile</label>
                                        <input type="number" class="form-control" value="{{user.mobile}}" readonly>
                                    </div>

                                    <div class="mb-3">
                                        <label>Address</label>
                                        <textarea name="address" rows="4"
                                            class="form-control">{{user.address}}</textarea>
                                    </div>

                                </form>

                            </div>

                        </div>

                    </div>


                    <!-- ORDERS TAB -->
                    <div class="tab-pane fade" id="orders">

                        <div class="card shadow-sm border-0">

                            <div class="card-header bg-white">
                                <h5 class="mb-0">My Orders</h5>
                            </div>

                            <div class="card-body">

                                <p>Your orders will appear here.</p>

                            </div>

                        </div>

                    </div>


                    <!-- ADDRESS TAB -->
                    <div class="tab-pane fade" id="address">

                        <div class="card shadow-sm border-0">

                            <div class="card-header bg-white">
                                <h5 class="mb-0">Address</h5>
                            </div>

                            <div class="card-body">

                                <textarea class="form-control" rows="5">
                                {{user.address}}
                                </textarea>

                            </div>

                        </div>

                    </div>


                </div>

            </div>

        </div>
    </div>
</section>

<style>
    .account-section {
        background: #f5f7fa;
    }

    .card {
        border-radius: 12px;
    }

    .list-group-item {
        border: none;
        cursor: pointer;
    }

    .list-group-item.active {
        background: #ff7a00;
        border-color: #ff7a00;
    }

    .btn-warning {
        background: #ff7a00;
        border: none;
    }

    .btn-warning:hover {
        background: #e86c00;
    }
</style>

{% endblock %}
